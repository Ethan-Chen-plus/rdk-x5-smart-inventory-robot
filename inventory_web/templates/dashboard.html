<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>囤囤钳家庭物资看板</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="dashboard-page">
  <header class="topbar">
    <div class="brand-mark">T</div>
    <div>
      <div class="eyebrow">TUNTUNCLAW · RDK X5</div>
      <h1>家庭物资库存</h1>
    </div>
    <div class="connection"><span id="connectionDot"></span><strong id="connectionText">正在连接</strong></div>
  </header>

  <main class="dashboard-main">
    <section class="inventory-table" aria-label="家庭物资库存表">
      <div class="table-header">
        <span>物品</span><span>当前剩余</span><span>提醒阈值</span><span>状态</span>
      </div>
      <div id="inventoryRows" class="table-body" aria-live="polite"></div>
    </section>
  </main>

  <footer class="dashboard-footer">
    <span>数据由囤囤钳库存服务实时同步</span>
    <time id="updatedAt">--</time>
  </footer>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
